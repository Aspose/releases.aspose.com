    - name: Upload es sitemap
      run: aws s3 cp public/es/sitemap-page.xml s3://releases.aspose.com/es/sitemap-page.xml --content-type application/xml --acl public-read
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
        AWS_DEFAULT_REGION: us-west-2

    - name: Upload fr folder
      uses: jakejarvis/s3-sync-action@master
      with:
        args: --acl public-read --follow-symlinks --delete
      env:
        AWS_S3_BUCKET: 'releases.aspose.com'
        AWS_ACCESS_KEY_ID:  ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
        AWS_REGION: 'us-west-2'
        SOURCE_DIR: 'public/fr/page'
        DEST_DIR: 'fr/page'

    - name: Upload fr sitemap
      run: aws s3 cp public/fr/sitemap-page.xml s3://releases.aspose.com/fr/sitemap-page.xml --content-type application/xml --acl public-read
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
