        SOURCE_DIR: 'public/id/gis'
        DEST_DIR: 'id/gis'

    - name: Upload id sitemap
      run: aws s3 cp public/id/sitemap-gis.xml s3://releases.aspose.com/id/sitemap-gis.xml --content-type application/xml --acl public-read
      env:
