        AWS_REGION: 'us-west-2'
        SOURCE_DIR: 'public/fr/medical'
        DEST_DIR: 'fr/medical'

    - name: Upload fr sitemap
      run: aws s3 cp public/fr/sitemap-medical.xml s3://releases.aspose.com/fr/sitemap-medical.xml --content-type application/xml --acl public-read
      env:
