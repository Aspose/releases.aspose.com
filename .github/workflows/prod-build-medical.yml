    # Invalidate Cloudfront (this action)
    - name: invalidate
      continue-on-error: true
      uses: chetan/invalidate-cloudfront-action@master
      env:
        DISTRIBUTION: ${{ secrets.AWS_DISTRIBUTION_PROD }}
        PATHS: / /index.html /index.json /sitemap.xml /de/sitemap-medical.xml /el/sitemap-medical.xml /en/sitemap-medical.xml /es/sitemap-medical.xml /fr/sitemap-medical.xml /id/sitemap-medical.xml /ja/sitemap-medical.xml /pt/sitemap-medical.xml /ru/sitemap-medical.xml /tr/sitemap-medical.xml /zh/sitemap-medical.xml /medical/* /de/medical/* /el/medical/* /en/medical/* /es/medical/* /fr/medical/* /id/medical/* /ja/medical/* /pt/medical/* /ru/medical/* /tr/medical/* /zh/medical/*
