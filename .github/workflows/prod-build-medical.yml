    - name: Upload id sitemap
      run: aws s3 cp public/id/sitemap-medical.xml s3://releases.aspose.com/id/sitemap-medical.xml --content-type application/xml --acl public-read
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
        AWS_DEFAULT_REGION: us-west-2

    - name: Upload ja folder
      uses: jakejarvis/s3-sync-action@master
      with:
        args: --acl public-read --follow-symlinks --delete
      env:
        AWS_S3_BUCKET: 'releases.aspose.com'
        AWS_ACCESS_KEY_ID:  ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
        AWS_REGION: 'us-west-2'
        SOURCE_DIR: 'public/ja/medical'
        DEST_DIR: 'ja/medical'

    - name: Upload ja sitemap
      run: aws s3 cp public/ja/sitemap-medical.xml s3://releases.aspose.com/ja/sitemap-medical.xml --content-type application/xml --acl public-read
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
