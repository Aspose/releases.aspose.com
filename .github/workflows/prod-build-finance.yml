    - name: Upload zh folder
      uses: jakejarvis/s3-sync-action@master
      with:
        args: --acl public-read --follow-symlinks --delete
      env:
        AWS_S3_BUCKET: 'releases.aspose.com'
        AWS_ACCESS_KEY_ID:  ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS}}
        AWS_REGION: 'us-west-2'
        SOURCE_DIR: 'public/zh/finance'
        DEST_DIR: 'zh/finance'

    - name: Upload zh sitemap
      run: aws s3 cp public/zh/sitemap-finance.xml s3://releases.aspose.com/zh/sitemap-finance.xml --content-type application/xml --acl public-read
