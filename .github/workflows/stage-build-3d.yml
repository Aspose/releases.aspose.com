    # Invalidate Cloudfront (this action)
    - name: invalidate
      uses: chetan/invalidate-cloudfront-action@master
      env:
        DISTRIBUTION: ${{ secrets.AWS_DISTRIBUTION }}
        PATHS_FROM: / /index.html /index.json /sitemap.xml /3d/* /de/3d/* /el/3d/* /en/3d/* /es/3d/* /fr/3d/* /id/3d/* /ja/3d/* /pt/3d/* /ru/3d/* /tr/3d/* /zh/3d/*
